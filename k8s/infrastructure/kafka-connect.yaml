apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  labels:
    app: kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      initContainers:
      - name: download-http-sink
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache unzip && \
          wget -qO plugin.zip https://d1i4a15mxbxib1.cloudfront.net/api/plugins/confluentinc/kafka-connect-http/versions/1.0.12/confluentinc-kafka-connect-http-1.0.12.zip && \
          unzip -q plugin.zip -d /custom-plugins && \
          rm plugin.zip
        volumeMounts:
        - name: custom-plugins
          mountPath: /custom-plugins
      containers:
      - name: kafka-connect
        image: quay.io/debezium/connect:2.5
        env:
        - name: BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: GROUP_ID
          value: "1"
        - name: CONFIG_STORAGE_TOPIC
          value: "connect_configs"
        - name: OFFSET_STORAGE_TOPIC
          value: "connect_offsets"
        - name: STATUS_STORAGE_TOPIC
          value: "connect_statuses"
        - name: CONNECT_PLUGIN_PATH
          value: "/kafka/connect,/custom-plugins"
        volumeMounts:
        - name: custom-plugins
          mountPath: /custom-plugins
        ports:
        - containerPort: 8083
          name: rest-api
      volumes:
      - name: custom-plugins
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
spec:
  selector:
    app: kafka-connect
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
