apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-renderer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git://git-server.default.svc.cluster.local:9418/configs.git
    targetRevision: HEAD
    path: resources/appconfigs
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
